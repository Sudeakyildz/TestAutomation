[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    smoke: Hızlı staging gate (~5 dk) — kritik API + login + dashboard nav
    regression: Tam regresyon paketi
    exploratory: Gevşek API keşif testleri (403/404 toleranslı)
    api: HTTP/API testleri
    e2e: Tarayıcı (SeleniumBase) testleri
    write: Gerçek POST/PUT/DELETE + cleanup
    functional: İş mantığı / roundtrip doğrulama
    unit: Saf Python unit testleri (staging'e gitmez)
    known_gitsec_bug: Bilinen GitSec ürün hatası — geçici xfail
    requires_github: GitHub credential gerektirir
    requires_repo: Tenant'ta repository gerektirir
    requires_schedule: Backup schedule gerektirir
